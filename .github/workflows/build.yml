name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ARM GCC toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /home/runner/arm-gcc-toolchain
          key: arm-gcc-9-2020-q2-update

      - name: Install ARM GCC toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils wget
          mkdir -p /home/runner/arm-gcc-toolchain
          wget -qO- "https://developer.arm.com/-/media/Files/downloads/gnu-rm/9-2020q2/gcc-arm-none-eabi-9-2020-q2-update-x86_64-linux.tar.bz2"             | tar -xjf - -C /home/runner/arm-gcc-toolchain --strip=1

      - name: Add toolchain to PATH
        run: echo "/home/runner/arm-gcc-toolchain/bin" >> $GITHUB_PATH

      - name: Build
        run: make
